<div class="dropdown">
  <div class="field" (click)="onSelectValue()(!isTrue())">
    <p [class.selected]="isTrue()">{{ isTrue() ? 'Yes' : 'No' }}</p>
    @if (isTrue()) {
      <img src="close-button.webp" (click)="onSelectValue()(false)" />
    } @else {
      <img src="downarrow.png" />
    }
  </div>
</div>
